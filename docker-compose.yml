version: "3.9"

# modelops demo - production-ready POC.
# 2 services orchestrated:
#   - modelops (Next.js frontend on host port 3019)
#   - modelops-backend (FastAPI Python, internal only on 8000)
# Shared external network wkdemo-net (created once by deploy.yml) avoids
# Docker default address-pool exhaustion across all 47 LP stacks.

services:
  modelops-backend:
    image: ghcr.io/wikolabs/modelops-backend:latest
    container_name: modelops-backend
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    networks:
      - wkdemo_net

  modelops:
    image: ghcr.io/wikolabs/modelops:latest
    container_name: modelops
    restart: unless-stopped
    ports:
      - "3019:3000"
    environment:
      BACKEND_URL: "http://modelops-backend:8000"
    depends_on:
      - modelops-backend
    networks:
      - wkdemo_net

networks:
  wkdemo_net:
    name: wkdemo-net
    external: true
